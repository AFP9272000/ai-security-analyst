AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Integration & Alerting (Security Tooling), with alert dedup
  (ADR-0019).

  PARITY NOTE: Terraform is the deployed source of truth. Reproduces the
  SNS topic (AWS-managed key), the dedup DynamoDB table, the two
  EventBridge rules (GuardDuty high severity + Security Hub HIGH/CRITICAL
  NEW+ACTIVE), the triage Lambda's IAM role, and the EventBridge invoke
  permissions. Lambda CODE is referenced from a pre-uploaded S3 artifact.
  The agent id is passed as a parameter.

Parameters:
  ProjectName:
    Type: String
    Default: ai-sec-analyst
  BaselineKmsKeyArn:
    Type: String
  AgentId:
    Type: String
  AgentAliasId:
    Type: String
    Default: TSTALIASID
  AlertEmail:
    Type: String
    Default: ''
  EnableAgentTriage:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  DedupTtlHours:
    Type: Number
    Default: 24
  SlackWebhookParam:
    Type: String
    Default: ''
  CodeBucket:
    Type: String
  CodeKey:
    Type: String
    Default: triage/triage.zip

Conditions:
  HasEmail: !Not [!Equals [!Ref AlertEmail, '']]

Resources:
  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-alerts'
      DisplayName: AI Sec Analyst Alerts
      KmsMasterKeyId: alias/aws/sns

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasEmail
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  DedupTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-alert-dedup'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: finding_id, AttributeType: S }
      KeySchema:
        - { AttributeName: finding_id, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref BaselineKmsKeyArn

  TriageRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-triage'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: triage
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-triage:*'
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref AlertsTopic
              - Effect: Allow
                Action: [dynamodb:PutItem, dynamodb:DeleteItem]
                Resource: !GetAtt DedupTable.Arn
              - Effect: Allow
                Action: bedrock:InvokeAgent
                Resource: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent-alias/${AgentId}/*'
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/*'
              - Effect: Allow
                Action: [kms:Decrypt, kms:GenerateDataKey, kms:DescribeKey]
                Resource: !Ref BaselineKmsKeyArn

  TriageLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-triage'
      RetentionInDays: 30
      KmsKeyId: !Ref BaselineKmsKeyArn

  TriageFunction:
    Type: AWS::Lambda::Function
    DependsOn: TriageLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-triage'
      Runtime: python3.12
      Handler: lambda_function.handler
      Role: !GetAtt TriageRole.Arn
      Timeout: 120
      MemorySize: 256
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref AlertsTopic
          AGENT_ID: !Ref AgentId
          AGENT_ALIAS_ID: !Ref AgentAliasId
          ENABLE_AGENT_TRIAGE: !Ref EnableAgentTriage
          DEDUP_TABLE: !Ref DedupTable
          DEDUP_TTL_HOURS: !Ref DedupTtlHours
          SLACK_WEBHOOK_PARAM: !Ref SlackWebhookParam
          MAX_RESUME_RETRIES: '5'

  GuardDutyHighRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectName}-guardduty-high-sev'
      Description: High-severity GuardDuty findings to the triage Lambda
      EventPattern:
        source: [aws.guardduty]
        detail-type: [GuardDuty Finding]
        detail:
          severity: [{ numeric: ['>=', 7] }]
      Targets:
        - Id: triage-lambda
          Arn: !GetAtt TriageFunction.Arn

  SecurityHubHighRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectName}-securityhub-high-sev'
      Description: New active HIGH/CRITICAL Security Hub findings to the triage Lambda
      EventPattern:
        source: [aws.securityhub]
        detail-type: [Security Hub Findings - Imported]
        detail:
          findings:
            Severity:
              Label: [HIGH, CRITICAL]
            Workflow:
              Status: [NEW]
            RecordState: [ACTIVE]
      Targets:
        - Id: triage-lambda
          Arn: !GetAtt TriageFunction.Arn

  GuardDutyInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TriageFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt GuardDutyHighRule.Arn

  SecurityHubInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TriageFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SecurityHubHighRule.Arn

Outputs:
  AlertTopicArn:
    Value: !Ref AlertsTopic
  TriageLambdaName:
    Value: !Ref TriageFunction
  DedupTableName:
    Value: !Ref DedupTable
