AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Baseline CMK per member account via CloudFormation StackSet.

  One symmetric ENCRYPT_DECRYPT key with rotation enabled, aliased
  alias/ai-sec-analyst-baseline, deployed to every account in the
  Security and Workload OUs.

  Key policy follows AWS's default pattern: account root has kms:*,
  delegated further by account IAM policies.

Parameters:
  ProjectName:
    Type: String
    Default: ai-sec-analyst

  AccountsStackName:
    Type: String
    Default: ai-sec-analyst-01-foundation-accounts
    Description: Stack to import Security/Workload OU IDs from

Resources:
  BaselineKeyStackSet:
    Type: AWS::CloudFormation::StackSet
    Properties:
      StackSetName: !Sub '${ProjectName}-baseline-kms'
      Description: Baseline general-purpose CMK in each member account
      PermissionModel: SERVICE_MANAGED
      AutoDeployment:
        Enabled: true
        RetainStacksOnAccountRemoval: false
      Capabilities:
        - CAPABILITY_NAMED_IAM
      CallAs: SELF
      StackInstancesGroup:
        - DeploymentTargets:
            OrganizationalUnitIds:
              - Fn::ImportValue: !Sub '${AccountsStackName}-SecurityOUId'
              - Fn::ImportValue: !Sub '${AccountsStackName}-WorkloadOUId'
          Regions:
            - !Ref AWS::Region
      TemplateBody:
        Fn::Sub: |
          AWSTemplateFormatVersion: '2010-09-09'
          Description: Baseline CMK in member account

          Resources:
            BaselineKey:
              Type: AWS::KMS::Key
              Properties:
                Description: Baseline CMK for ${ProjectName}
                EnableKeyRotation: true
                PendingWindowInDays: 30
                KeyUsage: ENCRYPT_DECRYPT
                KeySpec: SYMMETRIC_DEFAULT
                KeyPolicy:
                  Version: '2012-10-17'
                  Statement:
                    - Sid: EnableAccountRoot
                      Effect: Allow
                      Principal:
                        AWS: !Sub arn:aws:iam::$${AWS::AccountId}:root
                      Action: kms:*
                      Resource: '*'
                Tags:
                  - Key: Project
                    Value: ${ProjectName}
                  - Key: Layer
                    Value: 01-foundation
                  - Key: ManagedBy
                    Value: cloudformation

            BaselineKeyAlias:
              Type: AWS::KMS::Alias
              Properties:
                AliasName: alias/${ProjectName}-baseline
                TargetKeyId: !Ref BaselineKey

          Outputs:
            KeyArn:
              Value: !GetAtt BaselineKey.Arn
              Export:
                Name: !Sub '$${AWS::StackName}-KeyArn'

Outputs:
  StackSetId:
    Value: !Ref BaselineKeyStackSet
    Export:
      Name: !Sub '${AWS::StackName}-StackSetId'
