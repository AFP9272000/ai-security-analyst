name: terraform-deploy

on:
  workflow_dispatch:
    inputs:
      layer:
        description: 'Layer to operate on'
        required: true
        type: choice
        options:
          - 00.5-codepipeline
          - 01-foundation
          - 02-network
          - 03-telemetry
          - 04-data
          - 05-ml
          - 06-genai
          - 07-integration
          - 08-observability
      action:
        description: 'plan / apply / destroy'
        required: true
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: 1.7.5
  AWS_REGION: us-east-1
  TF_VAR_root_email: ${{ secrets.ROOT_EMAIL }}
  TF_VAR_codeconnections_arn: ${{ secrets.CODECONNECTIONS_ARN }}
  TF_VAR_codepipeline_layer_deployed: "true"

jobs:
  plan:
    name: Plan ${{ inputs.layer }} (${{ inputs.action }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        working-directory: iac/terraform/${{ inputs.layer }}
        run: |
          terraform init \
            -backend-config=../backend.hcl \
            -backend-config="key=${{ inputs.layer }}/terraform.tfstate"

      - name: terraform plan
        id: plan
        working-directory: iac/terraform/${{ inputs.layer }}
        run: |
          set -euo pipefail
          if [[ "${{ inputs.action }}" == "destroy" ]]; then
            terraform plan -destroy -out=tfplan -no-color | tee plan.txt
          else
            terraform plan -out=tfplan -no-color | tee plan.txt
          fi

      - name: verify build artifacts present (if any)
        working-directory: iac/terraform/${{ inputs.layer }}
        run: |
          if [ -d .build ]; then
            echo "Build artifacts found:"
            ls -la .build/
          else
            echo "No build artifacts (layer has no Lambdas)"
          fi

      # actions/upload-artifact@v4 EXCLUDES dotfiles by default. The
      # .build/ directory holds Lambda zip artifacts produced by
      # archive_file data sources; without include-hidden-files=true,
      # the apply job downloads tfplan but not the zips, and Lambda
      # resources fail with "no such file or directory".
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.layer }}
          path: |
            iac/terraform/${{ inputs.layer }}/tfplan
            iac/terraform/${{ inputs.layer }}/.build/**
          include-hidden-files: true
          if-no-files-found: ignore
          retention-days: 5

  apply:
    name: ${{ inputs.action }} ${{ inputs.layer }}
    if: inputs.action != 'plan'
    needs: plan
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.layer }}
          path: iac/terraform/${{ inputs.layer }}

      - name: verify downloaded artifacts
        working-directory: iac/terraform/${{ inputs.layer }}
        run: |
          echo "Contents of layer dir after artifact download:"
          ls -la
          if [ -d .build ]; then
            echo "Contents of .build/:"
            ls -la .build/
          fi

      - name: terraform init
        working-directory: iac/terraform/${{ inputs.layer }}
        run: |
          terraform init \
            -backend-config=../backend.hcl \
            -backend-config="key=${{ inputs.layer }}/terraform.tfstate"

      - name: terraform apply
        working-directory: iac/terraform/${{ inputs.layer }}
        run: terraform apply -auto-approve tfplan
