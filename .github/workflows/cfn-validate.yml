name: cfn-validate

on:
  pull_request:
    paths:
      - 'iac/cloudformation/**'
      - '.github/workflows/cfn-validate.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1

jobs:
  detect-layers:
    name: Detect changed layers
    runs-on: ubuntu-latest
    outputs:
      layers: ${{ steps.detect.outputs.layers }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        name: Find changed CFN layers that contain templates
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            candidate_layers=$(ls iac/cloudformation | grep -E '^[0-9]{2}-')
          else
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            candidate_layers=$(git diff --name-only "$base" "$head" \
              | grep -E '^iac/cloudformation/[0-9]{2}-[a-z-]+/' \
              | awk -F/ '{print $3}' \
              | sort -u)
          fi

          # Keep only layers that actually contain CFN templates.
          # Layers with only README.md (e.g. 00-bootstrap) are skipped.
          layers_with_templates=""
          for layer in $candidate_layers; do
            if ls iac/cloudformation/$layer/*.yaml iac/cloudformation/$layer/*.yml 2>/dev/null | grep -q .; then
              layers_with_templates+="$layer"$'\n'
            fi
          done

          if [[ -z "$layers_with_templates" ]]; then
            layers='[]'
          else
            layers=$(echo "$layers_with_templates" | jq -R -s -c 'split("\n") | map(select(. != ""))')
          fi

          echo "layers=$layers" >> "$GITHUB_OUTPUT"
          echo "Layers with templates: $layers"

  validate:
    name: Validate ${{ matrix.layer }}
    needs: detect-layers
    if: needs.detect-layers.outputs.layers != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        layer: ${{ fromJson(needs.detect-layers.outputs.layers) }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python linters
        run: pip install cfn-lint==1.* checkov

      - name: Install cfn-nag
        run: sudo gem install cfn-nag --no-document

      - name: cfn-lint
        working-directory: iac/cloudformation/${{ matrix.layer }}
        run: |
          shopt -s nullglob
          templates=( *.yaml *.yml *.json )
          if [[ ${#templates[@]} -eq 0 ]]; then
            echo "No templates in this layer."
            exit 0
          fi
          cfn-lint "${templates[@]}"

      - name: cfn-nag
        working-directory: iac/cloudformation/${{ matrix.layer }}
        run: |
          shopt -s nullglob
          templates=( *.yaml *.yml )
          if [[ ${#templates[@]} -eq 0 ]]; then
            echo "No YAML templates."
            exit 0
          fi
          cfn_nag_scan --input-path .

      - name: aws cloudformation validate-template
        working-directory: iac/cloudformation/${{ matrix.layer }}
        run: |
          shopt -s nullglob
          for t in *.yaml *.yml *.json; do
            echo "Validating $t"
            aws cloudformation validate-template --template-body "file://$t"
          done

      - uses: bridgecrewio/checkov-action@master
        with:
          directory: iac/cloudformation/${{ matrix.layer }}
          framework: cloudformation
          quiet: true
          soft_fail: false
