name: cfn-deploy

on:
  workflow_dispatch:
    inputs:
      layer:
        description: 'Layer to operate on'
        required: true
        type: choice
        options:
          - 01-foundation
          - 02-network
          - 03-telemetry
          - 04-data
          - 05-ml
          - 06-genai
          - 07-integration
      action:
        description: 'changeset / deploy / delete'
        required: true
        type: choice
        default: changeset
        options:
          - changeset
          - deploy
          - delete

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT: ai-sec-analyst
  ROOT_EMAIL: ${{ secrets.ROOT_EMAIL }}

jobs:
  changeset:
    name: Changeset for ${{ inputs.layer }}
    if: inputs.action != 'delete'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Management account ID
        id: mgmt
        run: |
          MGMT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "id=$MGMT_ID" >> "$GITHUB_OUTPUT"

      - name: Resolve Organization ID
        id: org
        run: |
          ORG_ID=$(aws organizations describe-organization --query Organization.Id --output text)
          echo "id=$ORG_ID" >> "$GITHUB_OUTPUT"

      - name: Resolve log-archive account ID for Config bucket name
        id: log_archive
        run: |
          LOG_ARCHIVE_ID=$(aws organizations list-accounts \
            --query "Accounts[?Name=='${PROJECT}-log-archive'].Id | [0]" \
            --output text)
          echo "id=$LOG_ARCHIVE_ID" >> "$GITHUB_OUTPUT"

      - name: Activate Org access for StackSets (idempotent)
        run: aws cloudformation activate-organizations-access || true

      - name: Generate changesets
        working-directory: iac/cloudformation/${{ inputs.layer }}
        env:
          MGMT_ID: ${{ steps.mgmt.outputs.id }}
          ORG_ID: ${{ steps.org.outputs.id }}
          LOG_ARCHIVE_ID: ${{ steps.log_archive.outputs.id }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t templates < <(ls *.yaml *.yml 2>/dev/null | sort)
          if [[ ${#templates[@]} -eq 0 ]]; then
            echo "::error::No templates found in this layer."
            exit 1
          fi
          for t in "${templates[@]}"; do
            base="${t%.*}"
            stack="${PROJECT}-${{ inputs.layer }}-${base}"
            params=""
            case "$base" in
              accounts)            params="--parameter-overrides RootEmail=${ROOT_EMAIL}" ;;
              iam)                 params="--parameter-overrides ManagementAccountId=${MGMT_ID}" ;;
              log-archive-bucket)  params="--parameter-overrides OrganizationId=${ORG_ID} ManagementAccountId=${MGMT_ID}" ;;
              config)              params="--parameter-overrides ConfigBucketName=${PROJECT}-config-logs-${LOG_ARCHIVE_ID}" ;;
            esac
            echo "::group::Changeset for $stack"
            aws cloudformation deploy \
              --stack-name "$stack" \
              --template-file "$t" \
              --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
              --no-execute-changeset \
              $params \
              --tags Project=$PROJECT Layer=${{ inputs.layer }} ManagedBy=cloudformation Environment=prod CostCenter=portfolio || true
            echo "::endgroup::"
          done

  deploy:
    name: Deploy ${{ inputs.layer }}
    if: inputs.action == 'deploy'
    needs: changeset
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Management account ID
        id: mgmt
        run: |
          MGMT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "id=$MGMT_ID" >> "$GITHUB_OUTPUT"

      - name: Resolve Organization ID
        id: org
        run: |
          ORG_ID=$(aws organizations describe-organization --query Organization.Id --output text)
          echo "id=$ORG_ID" >> "$GITHUB_OUTPUT"

      - name: Resolve log-archive account ID
        id: log_archive
        run: |
          LOG_ARCHIVE_ID=$(aws organizations list-accounts \
            --query "Accounts[?Name=='${PROJECT}-log-archive'].Id | [0]" \
            --output text)
          echo "id=$LOG_ARCHIVE_ID" >> "$GITHUB_OUTPUT"

      - name: Activate Org access for StackSets (idempotent)
        run: aws cloudformation activate-organizations-access || true

      - name: Deploy stacks
        working-directory: iac/cloudformation/${{ inputs.layer }}
        env:
          MGMT_ID: ${{ steps.mgmt.outputs.id }}
          ORG_ID: ${{ steps.org.outputs.id }}
          LOG_ARCHIVE_ID: ${{ steps.log_archive.outputs.id }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t templates < <(ls *.yaml *.yml 2>/dev/null | sort)
          for t in "${templates[@]}"; do
            base="${t%.*}"
            stack="${PROJECT}-${{ inputs.layer }}-${base}"
            params=""
            case "$base" in
              accounts)            params="--parameter-overrides RootEmail=${ROOT_EMAIL}" ;;
              iam)                 params="--parameter-overrides ManagementAccountId=${MGMT_ID}" ;;
              log-archive-bucket)  params="--parameter-overrides OrganizationId=${ORG_ID} ManagementAccountId=${MGMT_ID}" ;;
              config)              params="--parameter-overrides ConfigBucketName=${PROJECT}-config-logs-${LOG_ARCHIVE_ID}" ;;
            esac
            echo "::group::Deploying $stack"
            aws cloudformation deploy \
              --stack-name "$stack" \
              --template-file "$t" \
              --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
              --no-fail-on-empty-changeset \
              $params \
              --tags Project=$PROJECT Layer=${{ inputs.layer }} ManagedBy=cloudformation Environment=prod CostCenter=portfolio
            echo "::endgroup::"
          done

  delete:
    name: Delete ${{ inputs.layer }}
    if: inputs.action == 'delete'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete stacks
        working-directory: iac/cloudformation/${{ inputs.layer }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t templates < <(ls *.yaml *.yml 2>/dev/null | sort -r)
          for t in "${templates[@]}"; do
            base="${t%.*}"
            stack="${PROJECT}-${{ inputs.layer }}-${base}"
            echo "::group::Deleting $stack"
            aws cloudformation delete-stack --stack-name "$stack"
            aws cloudformation wait stack-delete-complete --stack-name "$stack" || true
            echo "::endgroup::"
          done
