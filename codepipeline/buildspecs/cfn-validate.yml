version: 0.2

# CodeBuild buildspec, CloudFormation validation across all layers that
# contain .yaml/.yml templates. Parallels GHA cfn-validate.yml.

phases:
  install:
    runtime-versions:
      python: 3.12
      ruby: 3.2
    commands:
      - pip install -q cfn-lint==1.* checkov
      - gem install cfn-nag --no-document

  build:
    commands:
      - set -euo pipefail
      - shopt -s nullglob
      - failed=0
      - |
        for layer_dir in iac/cloudformation/[0-9][0-9]*-*/; do
          layer=$(basename "$layer_dir")
          tpl=( "$layer_dir"*.yaml "$layer_dir"*.yml )
          if (( ${#tpl[@]} == 0 )); then
            echo "Skipping $layer (no templates)"
            continue
          fi
          echo "=== Validating $layer ==="
          cfn-lint "${tpl[@]}" || failed=1
          cfn_nag_scan --input-path "$layer_dir" || failed=1
          for t in "${tpl[@]}"; do
            aws cloudformation validate-template --template-body "file://$t" >/dev/null || failed=1
          done
          checkov -d "$layer_dir" --framework cloudformation --quiet || failed=1
        done
      - |
        if (( failed != 0 )); then
          echo "::error::One or more validators failed."
          exit 1
        fi
      - echo "All CloudFormation layers passed validation."
